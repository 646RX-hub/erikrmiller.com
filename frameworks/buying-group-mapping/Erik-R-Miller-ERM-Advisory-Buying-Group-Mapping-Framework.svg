<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 478" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bgm-t bgm-d">
<defs><style type="text/css"><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Syne:wght@700&family=DM+Sans:wght@400&display=swap');
]]></style></defs>

<rect width="700" height="478" fill="#f7f4ee"/>
<title id="bgm-t">Buying Group Mapping Framework — B2B Buying Committee Stakeholder Map</title>
<desc id="bgm-d">Network diagram of five B2B buying committee roles. Economic Buyer at center connected to Champion (upper left), Technical Evaluator (upper right), End User (lower left), Legal/Procurement (lower right), and Influencer (bottom center).</desc>
<g stroke="#b8922a" fill="none">
<line x1="283" y1="181" x2="211" y2="140" stroke-opacity="0.5" stroke-width="1.8"/>
<line x1="417" y1="181" x2="489" y2="140" stroke-opacity="0.5" stroke-width="1.8"/>
<line x1="283" y1="259" x2="211" y2="300" stroke-opacity="0.4" stroke-width="1.6"/>
<line x1="417" y1="259" x2="489" y2="300" stroke-opacity="0.4" stroke-width="1.6"/>
<line x1="350" y1="298" x2="350" y2="348" stroke-opacity="0.3" stroke-width="1.6"/>
</g>
<!-- Champion -->
<circle cx="150" cy="105" r="70" fill="rgba(184,146,42,0.08)" stroke="rgba(184,146,42,0.5)" stroke-width="1.6"/>
<text x="150" y="102" text-anchor="middle" font-family="Syne,sans-serif" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0c0b09">CHAMPION</text>
<text x="150" y="119" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#5a5047">Internal advocate</text>
<!-- Technical Evaluator -->
<circle cx="550" cy="105" r="70" fill="rgba(184,146,42,0.08)" stroke="rgba(184,146,42,0.5)" stroke-width="1.6"/>
<text x="550" y="93" text-anchor="middle" font-family="Syne,sans-serif" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0c0b09">TECHNICAL</text>
<text x="550" y="109" text-anchor="middle" font-family="Syne,sans-serif" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0c0b09">EVALUATOR</text>
<text x="550" y="125" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#5a5047">Feasibility gate</text>
<!-- End User -->
<circle cx="150" cy="335" r="70" fill="rgba(184,146,42,0.08)" stroke="rgba(184,146,42,0.5)" stroke-width="1.6"/>
<text x="150" y="332" text-anchor="middle" font-family="Syne,sans-serif" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0c0b09">END USER</text>
<text x="150" y="349" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#5a5047">Day-to-day operator</text>
<!-- Legal / Procurement -->
<circle cx="550" cy="335" r="70" fill="rgba(184,146,42,0.08)" stroke="rgba(184,146,42,0.5)" stroke-width="1.6"/>
<text x="550" y="323" text-anchor="middle" font-family="Syne,sans-serif" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0c0b09">LEGAL /</text>
<text x="550" y="339" text-anchor="middle" font-family="Syne,sans-serif" font-size="13" font-weight="700" letter-spacing="0.5" fill="#0c0b09">PROCUREMENT</text>
<text x="550" y="355" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#5a5047">Process gatekeeper</text>
<!-- Influencer -->
<circle cx="350" cy="398" r="50" fill="rgba(184,146,42,0.05)" stroke="rgba(184,146,42,0.32)" stroke-width="1.3"/>
<text x="350" y="395" text-anchor="middle" font-family="Syne,sans-serif" font-size="11" font-weight="700" letter-spacing="0.5" fill="#5a5047">INFLUENCER</text>
<text x="350" y="411" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#5a5047">Variable influence</text>
<!-- Economic Buyer (hub) -->
<circle cx="350" cy="220" r="78" fill="rgba(184,146,42,0.14)" stroke="#7a5e12" stroke-width="2.5"/>
<text x="350" y="206" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="22" font-style="italic" fill="#0c0b09">Economic</text>
<text x="350" y="228" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="22" font-style="italic" fill="#0c0b09">Buyer</text>
<text x="350" y="248" text-anchor="middle" font-family="Syne,sans-serif" font-size="10" font-weight="700" letter-spacing="0.6" fill="#7a5e12">BUDGET AUTHORITY</text>
<text x="350" y="470" text-anchor="middle" font-family="Syne,sans-serif" font-size="8" letter-spacing="2.5" fill="rgba(122,94,18,0.35)">ERM ADVISORY · BUYING GROUP MAPPING FRAMEWORK</text></svg>