name: Validate Navigation

# Fails the build if any production page's navigation drifts from the single
# source of truth (partials/nav.html). Keeps the sitewide nav permanently consistent.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate navigation is identical sitewide
        run: python3 scripts/validate-nav.py
