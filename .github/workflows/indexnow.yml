name: IndexNow Submit

# Submits changed, indexable HTML pages to IndexNow after each push to main.
# Only canonical `index.html` pages are sent, mapped to their pretty public URL.
#   Endpoint : https://api.indexnow.org/indexnow
#   Host     : erikrmiller.com
#   Key file : https://erikrmiller.com/f07af34e58704d2dbba1c76fb5ae4fe6.txt
#
# This workflow only pings the search-engine IndexNow API. It does not touch
# site content, layout, navigation, or the GitHub Pages deployment.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    env:
      HOST: erikrmiller.com
      KEY: f07af34e58704d2dbba1c76fb5ae4fe6
      KEY_LOCATION: https://erikrmiller.com/f07af34e58704d2dbba1c76fb5ae4fe6.txt
      ENDPOINT: https://api.indexnow.org/indexnow
    steps:
      - name: Checkout (with previous commit for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build changed URL list
        id: build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .indexnow
          : > .indexnow/changed.txt

          # --- Determine the changed files in this push -----------------------
          BEFORE="${{ github.event.before }}"
          # New branch / first push / missing parent -> fall back gracefully.
          if [ -z "${BEFORE}" ] \
             || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            BEFORE="$(git rev-parse HEAD~1 2>/dev/null || echo '')"
          fi

          if [ -n "${BEFORE}" ]; then
            # ACMR = Added/Copied/Modified/Renamed; deletions are not submitted.
            git diff --name-only --diff-filter=ACMR "${BEFORE}" "${{ github.sha }}" \
              > .indexnow/files.txt || true
          else
            git ls-files '*.html' > .indexnow/files.txt
          fi

          # --- Map each changed HTML page to its canonical public URL ---------
          while IFS= read -r f; do
            [ -n "$f" ] || continue

            # 1) Only consider .html files (this also ignores the IndexNow key .txt).
            case "$f" in
              *.html) ;;
              *) continue ;;
            esac

            # 2) Ignore files outside the published, canonical site:
            #    drafts/working copies/backups, the 404 page, and non-index
            #    HTML (partials, redirect stubs) whose canonical URL is the
            #    directory's index.html, not the file itself.
            case "$f" in
              _drafts/*|partials/*|scripts/*|*.backup|*.bak|404.html) continue ;;
              *-working.html|*-preview.html|index-*-working.html) continue ;;
            esac
            if [ "${f##*/}" != "index.html" ]; then
              echo "skip (non-canonical, not an index.html page): $f"
              continue
            fi

            # 3) Skip files removed by a later rename in the same range.
            [ -f "$f" ] || continue

            # 4) path/index.html -> https://erikrmiller.com/path/  (root for top level)
            if [ "$f" = "index.html" ]; then
              url="/"
            else
              url="/${f%index.html}"   # dir/index.html -> /dir/
            fi
            echo "https://${HOST}${url}" >> .indexnow/changed.txt
          done < .indexnow/files.txt

          # De-duplicate.
          sort -u -o .indexnow/changed.txt .indexnow/changed.txt

          COUNT=$(grep -c . .indexnow/changed.txt || true)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Changed indexable URLs (${COUNT}):"
          cat .indexnow/changed.txt || true

      - name: No changes to submit
        if: steps.build.outputs.count == '0'
        run: echo "No changed index.html pages detected -- nothing submitted to IndexNow."

      - name: Submit to IndexNow
        if: steps.build.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +%FT%TZ)"
          mapfile -t URLS < .indexnow/changed.txt

          # Build the exact required payload:
          # { host, key, keyLocation, urlList:[...] }
          JSON=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg kl "$KEY_LOCATION" \
            '{host:$host, key:$key, keyLocation:$kl, urlList:$ARGS.positional}' \
            --args "${URLS[@]}")
          printf '%s' "$JSON" > .indexnow/payload.json

          echo "Submitting ${#URLS[@]} URL(s) to ${ENDPOINT}:"
          printf '  - %s\n' "${URLS[@]}"

          HTTP=$(curl -sS -o .indexnow/response.txt -w '%{http_code}' \
            -X POST "$ENDPOINT" \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data @.indexnow/payload.json)

          echo "IndexNow HTTP status: ${HTTP}"
          echo "Response body:"
          sed 's/^/  /' .indexnow/response.txt || true

          # IndexNow returns 200 (or 202) on success; treat anything else as failure.
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "::error title=IndexNow submission failed::HTTP ${HTTP} from ${ENDPOINT}"
            exit 1
          fi
          echo "::notice title=IndexNow::success (HTTP ${HTTP}) -- ${#URLS[@]} URL(s) submitted at ${TS}"

      - name: Upload IndexNow log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexnow-log-${{ github.run_id }}
          path: .indexnow/
          retention-days: 90
