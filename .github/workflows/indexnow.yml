name: IndexNow Submit

# Submits newly created or materially updated URLs to IndexNow after each
# deploy to the production branch. Only changed, indexable HTML URLs are sent.
# Before anything is submitted, the sitemap-presence guard requires every changed
# URL to exist in sitemap.xml (missing URLs block the run; stale lastmod warns).
# Endpoint : https://api.indexnow.org/IndexNow
# Host     : erikrmiller.com
# Key file : https://erikrmiller.com/944495abd75a4b04ac89208cfe0a1d93.txt

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'sitemap.xml'
  workflow_dispatch:
    inputs:
      urls:
        description: 'Optional: space-separated URLs to submit manually'
        required: false

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    env:
      HOST: erikrmiller.com
      KEY: 944495abd75a4b04ac89208cfe0a1d93
      KEY_LOCATION: https://erikrmiller.com/944495abd75a4b04ac89208cfe0a1d93.txt
      ENDPOINT: https://api.indexnow.org/IndexNow
    steps:
      - name: Checkout (with history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build changed URL list
        id: build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .indexnow
          : > .indexnow/changed.txt
          : > .indexnow/map.tsv          # url<TAB>source-file (push event only)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.urls }}" ]; then
            printf '%s\n' ${{ github.event.inputs.urls }} > .indexnow/changed.txt
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "${BEFORE}" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              BEFORE="$(git rev-parse HEAD~1 2>/dev/null || echo '')"
            fi
            if [ -n "${BEFORE}" ]; then
              git diff --name-only --diff-filter=ACMR "${BEFORE}" "${{ github.sha }}" > .indexnow/files.txt || true
            else
              git ls-files '*.html' > .indexnow/files.txt
            fi

            while IFS= read -r f; do
              [ -n "$f" ] || continue
              case "$f" in
                *.html) ;;
                *) continue ;;
              esac
              # Skip drafts, backups, working copies, and the 404 page
              case "$f" in
                _drafts/*|*.backup|index-icp-working.html|activation-loop-preview.html|404.html) continue ;;
              esac
              # Skip files that no longer exist (deletions/renames source side)
              [ -f "$f" ] || continue
              # Skip redirect stubs and noindex pages
              grep -q 'http-equiv="refresh"' "$f" && continue || true
              grep -q 'name="robots"[^>]*noindex' "$f" && continue || true

              # Map file path -> canonical URL
              if [ "$f" = "index.html" ]; then
                url="/"
              elif [ "${f##*/}" = "index.html" ]; then
                url="/${f%index.html}"          # dir/index.html -> /dir/
              else
                url="/$f"                        # top-level page.html -> /page.html
              fi
              full="https://${HOST}${url}"
              echo "$full" >> .indexnow/changed.txt
              printf '%s\t%s\n' "$full" "$f" >> .indexnow/map.tsv
            done < .indexnow/files.txt
            sort -u -o .indexnow/changed.txt .indexnow/changed.txt
          fi

          COUNT=$(grep -c . .indexnow/changed.txt || echo 0)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Changed indexable URLs (${COUNT}):"
          cat .indexnow/changed.txt || true

      # ────────────────────────────────────────────────────────────────────
      # Sitemap-presence gate. Runs BEFORE any submission.
      #   * HARD FAIL  — a changed URL is absent from sitemap.xml (a new page
      #                  that was not added). Nothing is submitted; fix the
      #                  sitemap and re-push.
      #   * WARN ONLY  — the URL is in sitemap.xml but its <lastmod> is older
      #                  than the page's last change (e.g. a cosmetic/sitewide
      #                  edit). The run proceeds; the stale entries are logged.
      # Keeps the hand-curated sitemap the source of truth without blocking
      # routine deploys. Skipped for manual workflow_dispatch URLs.
      # ────────────────────────────────────────────────────────────────────
      - name: Verify changed URLs are present in sitemap.xml
        if: steps.build.outputs.count != '0' && !(github.event_name == 'workflow_dispatch' && github.event.inputs.urls != '')
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f sitemap.xml ]; then
            echo "::error title=Sitemap missing::sitemap.xml not found at repo root — cannot verify before submitting."
            exit 1
          fi

          MISSING=0
          : > .indexnow/sitemap-missing.txt
          : > .indexnow/sitemap-stale.txt

          while IFS=$'\t' read -r url file; do
            [ -n "$url" ] || continue

            # HARD requirement: URL must exist in sitemap.xml (literal match).
            if ! grep -qF "<loc>${url}</loc>" sitemap.xml; then
              echo "${url}  (source: ${file})" >> .indexnow/sitemap-missing.txt
              MISSING=1
              continue
            fi

            # Soft check: lastmod freshness -> warning only, never blocks.
            # POSIX awk; index() for literal loc match; ISO dates compare lexically.
            map_lastmod="$(awk -v loc="<loc>${url}</loc>" '
              index($0, loc){found=1}
              found && /<lastmod>/ {
                line=$0
                sub(/.*<lastmod>/,"",line)
                sub(/<\/lastmod>.*/,"",line)
                print line; exit
              }' sitemap.xml)"

            file_date="$(git log -1 --format=%cs -- "$file" 2>/dev/null || echo '')"
            if [ -z "$map_lastmod" ]; then
              echo "${url}: no <lastmod> in sitemap  (source: ${file})" >> .indexnow/sitemap-stale.txt
            elif [ -n "$file_date" ] && [ "$map_lastmod" \< "$file_date" ]; then
              echo "${url}: sitemap lastmod=${map_lastmod} < changed=${file_date}  (source: ${file})" >> .indexnow/sitemap-stale.txt
            fi
          done < .indexnow/map.tsv

          # Emit warnings for stale-but-present URLs (does not block).
          if [ -s .indexnow/sitemap-stale.txt ]; then
            echo "Stale (present in sitemap but lastmod not bumped) — submitting anyway:"
            while IFS= read -r line; do
              [ -n "$line" ] || continue
              echo "::warning title=Sitemap lastmod stale::${line}"
            done < .indexnow/sitemap-stale.txt
          fi

          # Block only when a changed URL is missing from the sitemap.
          if [ "$MISSING" = "1" ]; then
            echo "::error title=URL missing from sitemap::Add the URL(s) below to sitemap.xml, then re-push. IndexNow submission was blocked so no URL is pinged that the sitemap does not represent."
            echo "Missing from sitemap.xml:"
            sed 's/^/  - /' .indexnow/sitemap-missing.txt
            exit 1
          fi

          echo "All changed URLs are present in sitemap.xml — proceeding to submit."

      - name: Submit to IndexNow
        if: steps.build.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +%FT%TZ)"
          mapfile -t URLS < .indexnow/changed.txt

          JSON=$(jq -n \
            --arg host "$HOST" --arg key "$KEY" --arg kl "$KEY_LOCATION" \
            '{host:$host, key:$key, keyLocation:$kl, urlList:$ARGS.positional}' \
            --args "${URLS[@]}")
          printf '%s' "$JSON" > .indexnow/payload.json

          HTTP=$(curl -sS -o .indexnow/response.txt -w '%{http_code}' \
            -X POST "$ENDPOINT" \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data @.indexnow/payload.json)

          RESULT="success"
          if [ "$HTTP" -ge 400 ] || [ "$HTTP" -lt 200 ]; then RESULT="failure"; fi

          {
            echo "timestamp:       $TS"
            echo "endpoint:        $ENDPOINT"
            echo "host:            $HOST"
            echo "key_location:    $KEY_LOCATION"
            echo "http_status:     $HTTP"
            echo "result:          $RESULT"
            echo "submitted_count: ${#URLS[@]}"
            echo "submitted_urls:"
            printf '  - %s\n' "${URLS[@]}"
            echo "response_body:"
            sed 's/^/  /' .indexnow/response.txt || true
          } | tee .indexnow/log.txt

          echo "::notice title=IndexNow::${RESULT} (HTTP ${HTTP}) — ${#URLS[@]} URL(s) submitted at ${TS}"
          [ "$RESULT" = "success" ]

      - name: No changes to submit
        if: steps.build.outputs.count == '0'
        run: echo "No indexable URL changes detected — nothing submitted to IndexNow."

      - name: Upload IndexNow log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexnow-log-${{ github.run_id }}
          path: .indexnow/
          retention-days: 90
