name: Validate Content

# Content-integrity guards for the published site. Fails the build if either:
#   1. A production article under /blog/ has no card (link) on the blog index
#      (/blog/) — keeps the blog index from silently dropping published posts.
#   2. The search index (assets/search/search-index.json) is malformed,
#      internally inconsistent, references drafts, or lists a blog post that
#      is not carded on /blog/.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate every /blog/ article has a card on the blog index
        run: python3 scripts/validate-blog-cards.py
      - name: Validate search index integrity
        run: python3 scripts/validate-search-index.py
