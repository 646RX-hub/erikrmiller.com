<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="t d" font-family="'DM Sans',Helvetica,Arial,sans-serif">
<title id="t">The Shift to AI-Mediated Buying</title>
<desc id="d">A comparison of traditional search and AI-mediated buying. Clicks become Answers. Rankings become Citations. Share of Voice becomes Share of Model. SERP position becomes recommendation. Traffic becomes presence in the answer. ERM Advisory, Erik R. Miller.</desc>
<rect width="1200" height="1200" fill="#f7f4ee"/>
<rect width="1200" height="250" fill="#0c0b09"/>
<rect width="1200" height="6" fill="#b8922a"/>
<text x="80" y="90" font-size="20" font-weight="700" letter-spacing="4" fill="#b8922a">ERM ADVISORY &#183; THE AI VISIBILITY ARCHITECTURE</text>
<text x="80" y="162" font-family="'Cormorant Garamond',Georgia,serif" font-size="60" font-weight="300" fill="#f7f4ee">The Shift to <tspan font-style="italic" fill="#d4ac4e">AI-Mediated Buying</tspan></text>
<text x="80" y="208" font-size="20" font-weight="300" fill="rgba(247,244,238,0.62)">Buyers build the shortlist inside AI, before sales ever engages.</text>
<text x="300" y="338" text-anchor="middle" font-size="23" font-weight="700" fill="#6b6456">TRADITIONAL SEARCH</text>
<text x="880" y="338" text-anchor="middle" font-size="23" font-weight="700" fill="#7a5e12">AI-MEDIATED BUYING</text>
