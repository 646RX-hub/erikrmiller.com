<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="aef-t aef-d" focusable="false">
  <title id="aef-t">The ERM Agentic Execution Framework&#8482; — Erik R. Miller | ERM Advisory</title>
  <desc id="aef-d">A five-layer framework by Erik R. Miller showing the path AI agent capability must travel to become business outcomes. Agent capability enters at the top and must survive all five layers in sequence: Layer 1 Strategy Alignment, Layer 2 Workflow Integration, Layer 3 Human Oversight, Layer 4 Measurement, and Layer 5 Business Adoption. Each layer carries a question leadership must answer and a named failure mode where execution value leaks. A gap in any single layer is enough to break the chain between agent capability and realized business impact.</desc>

  <rect width="900" height="640" fill="#0c0b09"/>
  <rect x="0" y="0" width="3" height="640" fill="#b8922a" opacity="0.5"/>

  <text x="60" y="50" font-family="'Syne',Arial,sans-serif" font-size="17" font-weight="700" letter-spacing="2" fill="#d4ac4e">THE ERM AGENTIC EXECUTION FRAMEWORK&#8482;</text>
  <text x="60" y="74" font-family="'DM Sans',Arial,sans-serif" font-size="13" font-weight="400" fill="#f7f4ee" opacity="0.72">Five layers agent capability must survive to become business outcomes</text>
  <line x1="60" y1="90" x2="840" y2="90" stroke="#b8922a" stroke-width="0.7" opacity="0.3"/>

  <text x="60" y="122" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" fill="#d4ac4e">AGENT CAPABILITY ENTERS &#8595;</text>

  <!-- 5 layer bands -->
  <g font-family="'Syne',Arial,sans-serif">
    <!-- Layer 1 -->
    <rect x="60" y="138" width="780" height="78" fill="#161411" stroke="#b8922a" stroke-opacity="0.25"/>
    <rect x="60" y="138" width="3" height="78" fill="#b8922a"/>
    <text x="92" y="186" font-family="Georgia,serif" font-size="34" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.5">01</text>
    <text x="150" y="172" font-size="15" font-weight="700" letter-spacing="1.2" fill="#f7f4ee">STRATEGY ALIGNMENT</text>
    <text x="150" y="195" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.62">Is the agent solving a problem the business actually values?</text>
    <text x="828" y="172" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="11" fill="#d4ac4e" opacity="0.85">leak:</text>
    <text x="828" y="190" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.85">mandate drift</text>

    <!-- Layer 2 -->
    <rect x="60" y="222" width="780" height="78" fill="#0f0e0c" stroke="#b8922a" stroke-opacity="0.25"/>
    <rect x="60" y="222" width="3" height="78" fill="#b8922a"/>
    <text x="92" y="270" font-family="Georgia,serif" font-size="34" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.5">02</text>
    <text x="150" y="256" font-size="15" font-weight="700" letter-spacing="1.2" fill="#f7f4ee">WORKFLOW INTEGRATION</text>
    <text x="150" y="279" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.62">Does the agent live inside the real workflow, or beside it?</text>
    <text x="828" y="256" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="11" fill="#d4ac4e" opacity="0.85">leak:</text>
    <text x="828" y="274" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.85">pilot purgatory</text>

    <!-- Layer 3 -->
    <rect x="60" y="306" width="780" height="78" fill="#161411" stroke="#b8922a" stroke-opacity="0.25"/>
    <rect x="60" y="306" width="3" height="78" fill="#b8922a"/>
    <text x="92" y="354" font-family="Georgia,serif" font-size="34" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.5">03</text>
    <text x="150" y="340" font-size="15" font-weight="700" letter-spacing="1.2" fill="#f7f4ee">HUMAN OVERSIGHT</text>
    <text x="150" y="363" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.62">Do the people around the agent trust it enough to rely on it?</text>
    <text x="828" y="340" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="11" fill="#d4ac4e" opacity="0.85">leak:</text>
    <text x="828" y="358" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.85">trust deficit</text>

    <!-- Layer 4 -->
    <rect x="60" y="390" width="780" height="78" fill="#0f0e0c" stroke="#b8922a" stroke-opacity="0.25"/>
    <rect x="60" y="390" width="3" height="78" fill="#b8922a"/>
    <text x="92" y="438" font-family="Georgia,serif" font-size="34" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.5">04</text>
    <text x="150" y="424" font-size="15" font-weight="700" letter-spacing="1.2" fill="#f7f4ee">MEASUREMENT</text>
    <text x="150" y="447" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.62">Can leadership see what the agent is actually producing?</text>
    <text x="828" y="424" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="11" fill="#d4ac4e" opacity="0.85">leak:</text>
    <text x="828" y="442" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.85">invisible ROI</text>

    <!-- Layer 5 -->
    <rect x="60" y="474" width="780" height="78" fill="#161411" stroke="#b8922a" stroke-opacity="0.25"/>
    <rect x="60" y="474" width="3" height="78" fill="#b8922a"/>
    <text x="92" y="522" font-family="Georgia,serif" font-size="34" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.5">05</text>
    <text x="150" y="508" font-size="15" font-weight="700" letter-spacing="1.2" fill="#f7f4ee">BUSINESS ADOPTION</text>
    <text x="150" y="531" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.62">Has the organization changed how it works because of the agent?</text>
    <text x="828" y="508" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="11" fill="#d4ac4e" opacity="0.85">leak:</text>
    <text x="828" y="526" text-anchor="end" font-family="'DM Sans',Arial,sans-serif" font-size="12.5" fill="#f7f4ee" opacity="0.85">reversion</text>
  </g>

  <text x="60" y="578" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" fill="#d4ac4e">REALIZED BUSINESS OUTCOMES &#8595;</text>

  <line x1="60" y1="600" x2="840" y2="600" stroke="#b8922a" stroke-width="0.6" opacity="0.22"/>
  <text x="60" y="620" font-family="'Syne',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.2" fill="#f7f4ee" opacity="0.5">&#169; ERIK R. MILLER | ERM ADVISORY &#183; VERSION 1.0</text>
  <text x="840" y="620" text-anchor="end" font-family="'Syne',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.2" fill="#f7f4ee" opacity="0.5">ERIKRMILLER.COM</text>
</svg>
