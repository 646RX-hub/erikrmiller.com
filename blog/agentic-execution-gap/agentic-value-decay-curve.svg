<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="adc-t adc-d" focusable="false">
  <title id="adc-t">The Agentic Value Decay Curve&#8482; — Erik R. Miller | ERM Advisory</title>
  <desc id="adc-d">A framework diagram by Erik R. Miller showing how expected value from AI agents erodes across six stages between deployment and business impact. The intended value runs flat across the top at 100 percent, while the realized value declines stage by stage: 100 percent Expected Value, 80 percent Agent Capability, 60 percent Workflow Adoption, 45 percent Human Trust, 30 percent Measurement Visibility, and 15 percent Business Impact. The widening gold area between the two lines is the Agentic Execution Gap, representing roughly 85 percent of expected value lost before it reaches the business.</desc>

  <rect width="1000" height="600" fill="#0c0b09"/>
  <rect x="0" y="0" width="3" height="600" fill="#b8922a" opacity="0.5"/>

  <text x="130" y="52" font-family="'Syne',Arial,sans-serif" font-size="17" font-weight="700" letter-spacing="2" fill="#d4ac4e">THE AGENTIC VALUE DECAY CURVE&#8482;</text>
  <text x="130" y="77" font-family="'DM Sans',Arial,sans-serif" font-size="13" font-weight="400" fill="#f7f4ee" opacity="0.72">How 100% of expected value becomes 15% of business impact &#8212; stage by stage</text>
  <line x1="130" y1="93" x2="870" y2="93" stroke="#b8922a" stroke-width="0.7" opacity="0.3"/>

  <text x="130" y="146" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" fill="#d4ac4e">EXPECTED VALUE &#183; 100%</text>
  <line x1="130" y1="160" x2="870" y2="160" stroke="#b8922a" stroke-width="1.5" opacity="0.85" stroke-dasharray="3,4"/>

  <path d="M130,160 L278,212 L426,264 L574,303 L722,342 L870,381 L870,160 Z" fill="rgba(184,146,42,0.10)"/>
  <path d="M130,160 L278,212 L426,264 L574,303 L722,342 L870,381" fill="none" stroke="#f7f4ee" stroke-width="2.4" opacity="0.65"/>

  <line x1="870" y1="160" x2="870" y2="381" stroke="#b8922a" stroke-width="1" opacity="0.3" stroke-dasharray="2,4"/>
  <circle cx="870" cy="160" r="5" fill="#b8922a" opacity="0.4"/>

  <text x="600" y="208" text-anchor="middle" font-family="'Syne',Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="1.5" fill="#d4ac4e">THE AGENTIC EXECUTION GAP</text>
  <text x="600" y="232" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="13" font-weight="400" fill="#d4ac4e" opacity="0.9">~85% of expected value lost between deployment and impact</text>

  <g font-family="'Syne',Arial,sans-serif" font-weight="700" fill="#d4ac4e" text-anchor="middle">
    <text x="278" y="197" font-size="18">80%</text>
    <text x="426" y="249" font-size="18">60%</text>
    <text x="574" y="288" font-size="18">45%</text>
    <text x="722" y="327" font-size="18">30%</text>
    <text x="870" y="366" font-size="20">15%</text>
  </g>

  <g>
    <circle cx="130" cy="160" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="130" cy="160" r="3" fill="#b8922a"/>
    <circle cx="278" cy="212" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="278" cy="212" r="3" fill="#b8922a"/>
    <circle cx="426" cy="264" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="426" cy="264" r="3" fill="#b8922a"/>
    <circle cx="574" cy="303" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="574" cy="303" r="3" fill="#b8922a"/>
    <circle cx="722" cy="342" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="722" cy="342" r="3" fill="#b8922a"/>
    <circle cx="870" cy="381" r="11" fill="#b8922a"/>
  </g>

  <g font-family="'DM Sans',Arial,sans-serif" font-size="14" font-weight="400" fill="#f7f4ee" opacity="0.9" text-anchor="middle">
    <text x="204" y="421">&#215; capability loss</text>
    <text x="352" y="421">&#215; weak adoption</text>
    <text x="500" y="421">&#215; trust deficit</text>
    <text x="648" y="421">&#215; blind measurement</text>
    <text x="796" y="421">&#215; no business pull</text>
  </g>

  <line x1="130" y1="452" x2="870" y2="452" stroke="rgba(247,244,238,0.08)" stroke-width="1"/>

  <g text-anchor="middle">
    <text x="130" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">01</text>
    <text x="130" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#d4ac4e">EXPECTED</text>
    <text x="130" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#d4ac4e">VALUE</text>
    <text x="278" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">02</text>
    <text x="278" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">AGENT</text>
    <text x="278" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">CAPABILITY</text>
    <text x="426" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">03</text>
    <text x="426" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">WORKFLOW</text>
    <text x="426" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">ADOPTION</text>
    <text x="574" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">04</text>
    <text x="574" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">HUMAN</text>
    <text x="574" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">TRUST</text>
    <text x="722" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">05</text>
    <text x="722" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">MEASUREMENT</text>
    <text x="722" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">VISIBILITY</text>
    <text x="870" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.55">06</text>
    <text x="870" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#d4ac4e">BUSINESS</text>
    <text x="870" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#d4ac4e">IMPACT</text>
  </g>

  <line x1="130" y1="566" x2="870" y2="566" stroke="#b8922a" stroke-width="0.6" opacity="0.22"/>
  <text x="130" y="585" font-family="'Syne',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.2" fill="#f7f4ee" opacity="0.5">&#169; ERIK R. MILLER | ERM ADVISORY &#183; VERSION 1.0</text>
  <text x="870" y="585" text-anchor="end" font-family="'Syne',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.2" fill="#f7f4ee" opacity="0.5">ERIKRMILLER.COM</text>
</svg>
