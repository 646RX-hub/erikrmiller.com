<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="cont-t cont-d" focusable="false">
  <title id="cont-t">The Revenue Execution Gap Continuum&#8482; — Erik R. Miller | ERM Advisory</title>
  <desc id="cont-d">A framework diagram by Erik R. Miller showing the six-stage path from strategic intent to realized performance — Strategic Clarity, Organizational Alignment, Operational Readiness, Measurement and Visibility, Accountability and Adaptation, and Realized Performance. An intended path runs straight across the top at 100 percent while a realized path declines from 100 to 59 percent, illustrating the multiplicative Law of Execution Decay. The widening 41 percent distance between the two lines is the Revenue Execution Gap.</desc>

  <rect width="1000" height="600" fill="#0c0b09"/>
  <rect x="0" y="0" width="3" height="600" fill="#b8922a" opacity="0.5"/>

  <!-- header -->
  <text x="130" y="52" font-family="'Syne',Arial,sans-serif" font-size="17" font-weight="700" letter-spacing="2" fill="#d4ac4e">THE REVENUE EXECUTION GAP CONTINUUM&#8482;</text>
  <text x="130" y="77" font-family="'DM Sans',Arial,sans-serif" font-size="13" font-weight="400" fill="#f7f4ee" opacity="0.72">Why 90% at every layer becomes 59% realized &#8212; the Law of Execution Decay</text>
  <line x1="130" y1="93" x2="870" y2="93" stroke="#b8922a" stroke-width="0.7" opacity="0.3"/>

  <!-- intended outcome line -->
  <text x="130" y="146" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" fill="#d4ac4e">INTENDED OUTCOME &#183; 100%</text>
  <line x1="130" y1="160" x2="870" y2="160" stroke="#b8922a" stroke-width="1.5" opacity="0.85" stroke-dasharray="3,4"/>

  <!-- gap wedge -->
  <path d="M130,160 L278,214 L426,262 L574,305 L722,342 L870,380 L870,160 Z" fill="rgba(184,146,42,0.10)"/>

  <!-- realized (declining) line -->
  <path d="M130,160 L278,214 L426,262 L574,305 L722,342 L870,380" fill="none" stroke="#f7f4ee" stroke-width="2.4" opacity="0.65"/>

  <!-- end-drop indicator -->
  <line x1="870" y1="160" x2="870" y2="380" stroke="#b8922a" stroke-width="1" opacity="0.3" stroke-dasharray="2,4"/>
  <circle cx="870" cy="160" r="5" fill="#b8922a" opacity="0.4"/>

  <!-- wedge annotation -->
  <text x="600" y="210" text-anchor="middle" font-family="'Syne',Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="1.5" fill="#d4ac4e">THE EXECUTION GAP</text>
  <text x="600" y="234" text-anchor="middle" font-family="'DM Sans',Arial,sans-serif" font-size="13" font-weight="400" fill="#d4ac4e" opacity="0.9">41% of strategy lost between intent and result</text>

  <!-- cumulative realized percentages (above nodes) -->
  <g font-family="'Syne',Arial,sans-serif" font-weight="700" fill="#d4ac4e" text-anchor="middle">
    <text x="278" y="197" font-size="18">90%</text>
    <text x="426" y="245" font-size="18">81%</text>
    <text x="574" y="288" font-size="18">73%</text>
    <text x="722" y="325" font-size="18">66%</text>
    <text x="870" y="363" font-size="20">59%</text>
  </g>

  <!-- nodes -->
  <g>
    <circle cx="130" cy="160" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="130" cy="160" r="3" fill="#b8922a"/>
    <circle cx="278" cy="214" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="278" cy="214" r="3" fill="#b8922a"/>
    <circle cx="426" cy="262" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="426" cy="262" r="3" fill="#b8922a"/>
    <circle cx="574" cy="305" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="574" cy="305" r="3" fill="#b8922a"/>
    <circle cx="722" cy="342" r="8" fill="#0c0b09" stroke="#b8922a" stroke-width="2.2"/><circle cx="722" cy="342" r="3" fill="#b8922a"/>
    <circle cx="870" cy="380" r="11" fill="#b8922a"/>
  </g>

  <!-- failure labels (own row, high contrast) -->
  <g font-family="'DM Sans',Arial,sans-serif" font-size="14" font-weight="400" fill="#f7f4ee" opacity="0.9" text-anchor="middle">
    <text x="204" y="420">&#215; translation loss</text>
    <text x="352" y="420">&#215; silo friction</text>
    <text x="500" y="420">&#215; execution debt</text>
    <text x="648" y="420">&#215; visibility gap</text>
    <text x="796" y="420">&#215; no adaptation</text>
  </g>

  <line x1="130" y1="452" x2="870" y2="452" stroke="rgba(247,244,238,0.08)" stroke-width="1"/>

  <!-- stage labels -->
  <g text-anchor="middle">
    <text x="130" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">01</text>
    <text x="130" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#d4ac4e">STRATEGIC</text>
    <text x="130" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#d4ac4e">CLARITY</text>

    <text x="278" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">02</text>
    <text x="278" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">ORGANIZATIONAL</text>
    <text x="278" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">ALIGNMENT</text>

    <text x="426" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">03</text>
    <text x="426" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">OPERATIONAL</text>
    <text x="426" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">READINESS</text>

    <text x="574" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">04</text>
    <text x="574" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">MEASUREMENT</text>
    <text x="574" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">&amp; VISIBILITY</text>

    <text x="722" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.4">05</text>
    <text x="722" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">ACCOUNTABILITY</text>
    <text x="722" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#f7f4ee" opacity="0.9">&amp; ADAPTATION</text>

    <text x="870" y="498" font-family="Georgia,serif" font-size="26" font-weight="300" font-style="italic" fill="#b8922a" opacity="0.55">06</text>
    <text x="870" y="520" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#d4ac4e">REALIZED</text>
    <text x="870" y="536" font-family="'Syne',Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1" fill="#d4ac4e">PERFORMANCE</text>
  </g>

  <line x1="130" y1="566" x2="870" y2="566" stroke="#b8922a" stroke-width="0.6" opacity="0.22"/>
  <text x="130" y="585" font-family="'Syne',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.2" fill="#f7f4ee" opacity="0.5">ERM ADVISORY &#183; THE LAW OF EXECUTION DECAY</text>
  <text x="870" y="585" text-anchor="end" font-family="'Syne',Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.2" fill="#f7f4ee" opacity="0.5">ERIK R. MILLER &#183; ERIKRMILLER.COM</text>
</svg>
